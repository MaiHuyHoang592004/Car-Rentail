services:
  postgres:
    image: postgres:16-alpine
    container_name: rentflow-postgres
    environment:
      POSTGRES_DB: rentflow
      POSTGRES_USER: rentflow
      POSTGRES_PASSWORD: rentflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentflow -d rentflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rentflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgrest:
    image: postgrest/postgrest:v12.2.0
    container_name: rentflow-postgrest
    profiles:
      - postgrest
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://rentflow:rentflow@postgres:5432/rentflow
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: rentflow
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
