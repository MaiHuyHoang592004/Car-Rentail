spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/rentflow
    username: rentflow
    password: rentflow
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}

logging:
  level:
    com.rentflow: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.jdbc: DEBUG
    org.springframework.boot.context.config: DEBUG

jwt:
  secret: ${JWT_SECRET:}

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY:}

rentflow:
  payment:
    sandbox-transfer-confirmation:
      enabled: ${RENTFLOW_PAYMENT_SANDBOX_TRANSFER_CONFIRMATION_ENABLED:true}
  mail:
    enabled: ${RENTFLOW_MAIL_ENABLED:true}
    frontend-base-url: ${RENTFLOW_FRONTEND_BASE_URL:http://localhost:3000}
  file:
    signed-url:
      secret: ${RENTFLOW_FILE_SIGNED_URL_SECRET:rentflow-local-file-signed-url-secret-1234567890}

server:
  port: 8087
