spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/rentflow
    username: rentflow
    password: rentflow
  mail:
    host: ${SPRING_MAIL_HOST:mailpit}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}

rentflow:
  mail:
    enabled: ${RENTFLOW_MAIL_ENABLED:true}
    frontend-base-url: ${RENTFLOW_FRONTEND_BASE_URL:http://localhost:3000}
