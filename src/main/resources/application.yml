spring:
  application:
    name: rentflow-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:rentflow}
    username: ${DB_USER:rentflow}
    password: ${DB_PASSWORD:rentflow}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${JPA_FORMAT_SQL:false}
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiry: PT15M
  refresh-token-expiry: P7D

rentflow:
  scheduler:
    expire-held-bookings:
      enabled: ${EXPIRE_HELD_BOOKINGS_ENABLED:true}
      batch-size: ${EXPIRE_HELD_BOOKINGS_BATCH_SIZE:100}
      fixed-delay-ms: ${EXPIRE_HELD_BOOKINGS_FIXED_DELAY_MS:60000}

server:
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    com.rentflow: INFO
    # Spring Security logging enabled in Phase 2 when SecurityConfig is introduced.
