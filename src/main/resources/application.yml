spring:
  application:
    name: rentflow-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:rentflow}
    username: ${DB_USER:rentflow}
    password: ${DB_PASSWORD:rentflow}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${JPA_FORMAT_SQL:false}
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      repositories:
        enabled: false

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiry: PT15M
  refresh-token-expiry: P7D

rentflow:
  cors:
    allowed-origins: ${RENTFLOW_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  auth:
    client-ip:
      trusted-proxies: ${RENTFLOW_AUTH_TRUSTED_PROXIES:}
  payment:
    require-email-verification: ${RENTFLOW_PAYMENT_REQUIRE_EMAIL_VERIFICATION:false}
    bank-transfer:
      account-number: ${RENTFLOW_BANK_TRANSFER_ACCOUNT_NUMBER:1234567890}
      account-name: ${RENTFLOW_BANK_TRANSFER_ACCOUNT_NAME:RENTFLOW ESCROW}
      transfer-content-prefix: ${RENTFLOW_BANK_TRANSFER_CONTENT_PREFIX:RENTFLOW}
    corebank:
      base-url: ${RENTFLOW_COREBANK_BASE_URL:http://localhost:8081}
      connect-timeout: ${RENTFLOW_COREBANK_CONNECT_TIMEOUT:PT3S}
      read-timeout: ${RENTFLOW_COREBANK_READ_TIMEOUT:PT5S}
      payee-account-id: ${RENTFLOW_COREBANK_PAYEE_ACCOUNT_ID:rentflow-escrow-corebank-account-id}
  scheduler:
    expire-held-bookings:
      enabled: ${EXPIRE_HELD_BOOKINGS_ENABLED:true}
      batch-size: ${EXPIRE_HELD_BOOKINGS_BATCH_SIZE:100}
      fixed-delay-ms: ${EXPIRE_HELD_BOOKINGS_FIXED_DELAY_MS:60000}
    void-retry:
      enabled: ${VOID_RETRY_ENABLED:true}
      batch-size: ${VOID_RETRY_BATCH_SIZE:50}
      fixed-delay-ms: ${VOID_RETRY_FIXED_DELAY_MS:60000}
      max-attempts: ${VOID_RETRY_MAX_ATTEMPTS:10}
      backoff-seconds: ${VOID_RETRY_BACKOFF_SECONDS:300}
    expire-driver-verifications:
      enabled: ${EXPIRE_DRIVER_VERIFICATIONS_ENABLED:true}
      batch-size: ${EXPIRE_DRIVER_VERIFICATIONS_BATCH_SIZE:100}
      cron: ${EXPIRE_DRIVER_VERIFICATIONS_CRON:0 0 0 * * *}
    expire-host-approvals:
      enabled: ${EXPIRE_HOST_APPROVALS_ENABLED:true}
      batch-size: ${EXPIRE_HOST_APPROVALS_BATCH_SIZE:100}
      fixed-delay-ms: ${EXPIRE_HOST_APPROVALS_FIXED_DELAY_MS:60000}
  rate-limit:
    enabled: ${RENTFLOW_RATE_LIMIT_ENABLED:true}
    login:
      limit: ${RENTFLOW_LOGIN_RATE_LIMIT:5}
      window: ${RENTFLOW_LOGIN_RATE_WINDOW:PT15M}
    booking:
      create-limit: ${RENTFLOW_BOOKING_CREATE_RATE_LIMIT:10}
      create-window: ${RENTFLOW_BOOKING_CREATE_RATE_WINDOW:PT1H}
    public-endpoint:
      limit: ${RENTFLOW_PUBLIC_RATE_LIMIT:60}
      window: ${RENTFLOW_PUBLIC_RATE_WINDOW:PT1M}
  booking:
    require-email-verification: ${RENTFLOW_BOOKING_REQUIRE_EMAIL_VERIFICATION:false}
    require-driver-verification: ${RENTFLOW_BOOKING_REQUIRE_DRIVER_VERIFICATION:false}
  file:
    signed-url:
      ttl: ${RENTFLOW_FILE_SIGNED_URL_TTL:PT10M}
      base-url: ${RENTFLOW_FILE_SIGNED_URL_BASE:https://files.rentflow.local}
      secret: ${RENTFLOW_FILE_SIGNED_URL_SECRET:change-me}
  report:
    platform-fee-rate: ${RENTFLOW_PLATFORM_FEE_RATE:0.15}

server:
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    com.rentflow: INFO
    # Spring Security logging enabled in Phase 2 when SecurityConfig is introduced.
