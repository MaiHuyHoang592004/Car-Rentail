spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

jwt:
  secret: test-jwt-secret-key-for-unit-tests-only-minimum-60-bytes-required-for-hs512
  access-token-expiry: PT15M
  refresh-token-expiry: P7D

encryption:
  secret: Q6iaj8bzwS3UjXZTvgin7MChtBS6lhUZmj19bHF6z1o=

rentflow:
  file:
    signed-url:
      secret: test-signed-url-secret-1234567890-abcdef
  scheduler:
    expire-held-bookings:
      enabled: false
    expire-host-approvals:
      enabled: false
    expire-driver-verifications:
      enabled: false
    idempotency-cleanup:
      enabled: false
    void-retry:
      enabled: false
    outbox-publisher:
      enabled: false
