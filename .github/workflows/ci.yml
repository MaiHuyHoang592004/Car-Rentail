name: RentFlow CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  unit-and-package:
    name: Unit + Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run unit and WebMvc tests
        run: ./mvnw -B clean test

      - name: Build application artifact
        run: ./mvnw -B -DskipTests package

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: rentflow-api-jar
          path: target/*.jar
          if-no-files-found: error

  integration-tests:
    name: Integration (Testcontainers)
    runs-on: ubuntu-latest
    needs: unit-and-package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run integration profile
        run: ./mvnw -B verify -Pintegration-tests

  frontend:
    name: Frontend Test + Lint + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        working-directory: frontend
        run: pnpm test

      - name: Run frontend lint
        working-directory: frontend
        run: pnpm lint

      - name: Build frontend
        working-directory: frontend
        run: pnpm build
