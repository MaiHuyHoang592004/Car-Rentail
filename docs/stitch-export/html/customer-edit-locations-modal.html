<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Locations Modal - RentFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                      "outline": "#737686",

                      "surface-container-lowest": "#ffffff",
                      "on-secondary-container": "#5c2400",
                      "on-secondary": "#ffffff",
                      "inverse-primary": "#b5c4ff",
                      "on-error-container": "#93000a",
                      "primary-fixed-dim": "#b5c4ff",
                      "surface": "#faf8ff",
                      "on-surface-variant": "#434654",
                      "outline-variant": "#c3c5d7",
                      "surface-container-high": "#e7e7f3",
                      "primary": "#003fb1",
                      "on-primary-fixed": "#00174d",
                      "on-primary-fixed-variant": "#003dab",
                      "error": "#ba1a1a",
                      "surface-dim": "#d9d9e4",
                      "surface-container-highest": "#e2e1ed",
                      "surface-tint": "#1353d8",
                      "on-tertiary": "#ffffff",
                      "surface-variant": "#e2e1ed",
                      "secondary-fixed-dim": "#ffb690",
                      "secondary-fixed": "#ffdbca",
                      "on-secondary-fixed": "#341100",
                      "background": "#faf8ff",
                      "tertiary-fixed-dim": "#ffb59a",
                      "secondary": "#9d4300",
                      "on-primary-container": "#d4dcff",
                      "inverse-surface": "#2e3039",
                      "primary-container": "#1a56db",
                      "surface-container": "#ededf8",
                      "on-surface": "#191b23"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "margin_mobile": "16px",
                      "stack_sm": "8px",
                      "gutter": "24px",
                      "container_max_width": "1280px",
                      "stack_md": "16px",
                      "base": "4px",
                      "stack_lg": "32px"
              },
              "fontFamily": {
                      "display": [
                              "Manrope"
                      ],
                      "caption": [
                              "Inter"
                      ],
                      "headline-lg-mobile": [
                              "Manrope"
                      ],
                      "body-lg": [
                              "Inter"
                      ],
                      "label-md": [

                      ],
                      "headline-lg": [

                      ],
                      "headline-md": [

</head>
<body class="bg-surface font-body-md text-on-surface antialiased h-screen w-screen overflow-hidden flex items-center justify-center">
<!-- Modal Backdrop / Level 3 Depth -->
<div class="fixed inset-0 bg-on-background/40 backdrop-blur-[12px] z-40 transition-opacity flex items-center justify-center p-margin_mobile md:p-gutter">
<!-- Modal Container (Level 3 Surface) -->
<div class="bg-surface-container-lowest w-full max-w-2xl rounded-xl shadow-[0px_20px_25px_-5px_rgba(0,0,0,0.1),0px_10px_10px_-5px_rgba(0,0,0,0.04)] border border-outline-variant overflow-hidden flex flex-col relative z-50">
<!-- Modal Header -->
<div class="flex items-center justify-between p-stack_lg border-b border-outline-variant">
<h2 class="font-headline-md text-headline-md text-on-surface m-0">Edit pickup and return locations</h2>
<button aria-label="Close modal" class="text-on-surface-variant hover:text-on-surface transition-colors p-base rounded-full hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="p-stack_lg overflow-y-auto max-h-[614px] flex flex-col gap-stack_lg">
<!-- Helper/Info Alert -->
<div class="bg-surface-container-low border border-outline-variant rounded-lg p-stack_md flex gap-stack_md items-start">
<span class="material-symbols-outlined text-primary mt-1" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="font-body-md text-body-md text-on-surface-variant m-0">
                        These are preferred pickup and return notes. Delivery fees are not calculated in this version.
                    </p>
</div>
<!-- Validation Error Banner -->
<div class="bg-error-container border border-error/20 rounded-lg p-stack_md flex gap-stack_md items-start">
<span class="material-symbols-outlined text-error mt-1" style="font-variation-settings: 'FILL' 1;">error</span>
<p class="font-body-md text-body-md text-on-error-container m-0">
                        Enter at least one location to update.
                    </p>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-stack_lg">
<!-- Pickup Location -->
<div class="flex flex-col gap-stack_sm">
<label class="font-label-md text-label-md text-on-surface" for="pickup_notes">Pickup Location / Notes</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-stack_md top-stack_md text-on-surface-variant pointer-events-none" style="font-variation-settings: 'FILL' 0;">location_on</span>
<textarea class="w-full bg-surface-bright border border-outline-variant rounded-lg pl-[48px] pr-stack_md py-stack_md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all resize-y min-h-[100px]" id="pickup_notes" name="pickup_notes" placeholder="e.g. Main Terminal Arrivals, Gate 4" rows="3"></textarea>
</div>
</div>
<!-- Return Location -->
<div class="flex flex-col gap-stack_sm">
<label class="font-label-md text-label-md text-on-surface" for="return_notes">Return Location / Notes</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-stack_md top-stack_md text-on-surface-variant pointer-events-none" style="font-variation-settings: 'FILL' 0;">keyboard_return</span>
<textarea class="w-full bg-surface-bright border border-outline-variant rounded-lg pl-[48px] pr-stack_md py-stack_md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all resize-y min-h-[100px]" id="return_notes" name="return_notes" placeholder="e.g. Hotel Valet, 123 Main St." rows="3"></textarea>
</div>
</div>
</div>
</div>
<!-- Modal Footer (CTAs) -->
<div class="bg-surface-container-low p-stack_lg border-t border-outline-variant flex flex-col-reverse sm:flex-row justify-end gap-stack_md">
<button class="px-gutter py-stack_sm rounded-lg font-label-md text-label-md text-on-surface-variant hover:text-on-surface bg-transparent hover:bg-surface-container-high transition-colors focus:outline-none focus:ring-2 focus:ring-primary" type="button">
                    Cancel
                </button>
<button class="px-gutter py-stack_sm rounded-lg font-label-md text-label-md text-on-primary bg-primary hover:bg-on-primary-fixed-variant transition-colors shadow-sm hover:shadow-md focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-lowest" type="button">
                    Save changes
                </button>
</div>
</div>
</div>
</body></html>
