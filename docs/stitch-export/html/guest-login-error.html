<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RentFlow - Authentication Failed</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Font Awesome for Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<!-- Custom Configuration -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            red: {
              50: '#fef2f2',
              100: '#fee2e2',
              600: '#dc2626',
              700: '#b91c1c',
            }
          }
        }
      }
    }
  </script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="background-setup">
    body {
      /* Background image of car interior */
      background-image: url('https://lh3.googleusercontent.com/aida/ADBb0uiivKxCYdzbT2JKGBRDyim4jQ5pYFvlW0rM-jZFpdbyM3piR84pR-G65rCqCSDGSiNLgvVrTadissUrZXYsQWwj-9iTROWf1b07kT1uZJKPoMK5ZCtEjc4CwZoKX7yLqh1ez5bLIsLMTD_BVKemZ4YLJ1GrVdVpXUUUC3FbQAY9ZFxwYwf4ZIyUfJlcU9QbqdjEKpyH0oGHxRwf7RTNtCcrAxlMdXa0bhuniKadBwZlFtbcZUNefSKYcMPWLEjWL95qbeJa-qFwOyY');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      /* Add a subtle dark overlay to make the card pop */
      background-color: rgba(0, 0, 0, 0.6);
      background-blend-mode: overlay;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body class="font-sans antialiased text-gray-900">
<!-- BEGIN: Login Container -->
<main class="w-full max-w-md p-8 bg-white rounded-xl shadow-2xl relative z-10 mx-4" data-purpose="login-card">
<!-- BEGIN: Header Section -->
<div class="text-center mb-8">
<!-- Logo Icon -->
<div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-gray-100 mb-4">
<i class="fa-solid fa-car text-xl text-gray-800"></i>
</div>
<!-- Brand Name -->
<h1 class="text-2xl font-bold text-gray-900 mb-2">RentFlow</h1>
<p class="text-sm text-gray-500">Sign in to your professional account</p>
</div>
<!-- END: Header Section -->
<!-- BEGIN: Error Alert -->
<div class="mb-6 p-4 rounded-lg bg-red-50 border border-red-200 flex items-start" data-purpose="error-alert">
<div class="flex-shrink-0 mt-0.5">
<i class="fa-solid fa-circle-exclamation text-red-600"></i>
</div>
<div class="ml-3">
<h3 class="text-sm font-semibold text-red-700">Authentication Failed</h3>
<p class="text-sm text-red-600 mt-1">The email or password you entered is incorrect. Please try again or reset your password.</p>
</div>
</div>
<!-- END: Error Alert -->
<!-- BEGIN: Login Form -->
<form action="#" class="space-y-5" data-purpose="login-form" method="POST">
<!-- Email Input -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-1" for="email">Email Address</label>
<div class="relative">
<input aria-describedby="email-error" aria-invalid="true" class="block w-full rounded-md border-red-600 shadow-sm focus:border-red-600 focus:ring-red-600 sm:text-sm py-2.5 px-3 text-gray-900 pr-10" id="email" name="email" type="email" value="admin@rentflow.co"/>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
<i class="fa-solid fa-triangle-exclamation text-red-600"></i>
</div>
</div>
</div>
<!-- Password Input -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
<div class="relative">
<input aria-describedby="password-error" aria-invalid="true" class="block w-full rounded-md border-red-600 shadow-sm focus:border-red-600 focus:ring-red-600 sm:text-sm py-2.5 px-3 text-gray-900 pr-10" id="password" name="password" type="password" value="••••••••"/>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
<i class="fa-solid fa-triangle-exclamation text-red-600"></i>
</div>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between mt-4">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-gray-300 text-black focus:ring-black" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-gray-700" for="remember-me">Remember me</label>
</div>
<div class="text-sm">
<a class="font-medium text-gray-900 hover:text-gray-700" href="#">Forgot Password?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-black hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black mt-6 transition-colors duration-200" type="submit">
        Sign In
      </button>
</form>
<!-- END: Login Form -->
<!-- BEGIN: Footer Divider & Registration Link -->
<div class="mt-8">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-200"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="bg-white px-4 text-gray-500">New to RentFlow?</span>
</div>
</div>
<div class="mt-6 text-center">
<a class="text-sm font-semibold text-gray-900 hover:text-gray-700 transition-colors duration-200" href="#">
          Register a new account
        </a>
</div>
</div>
<!-- END: Footer Divider & Registration Link -->
</main>
<!-- END: Login Container -->
</body></html>
