<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RentFlow Stitch Export</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #faf8ff;
      --surface: #ffffff;
      --text: #191b23;
      --muted: #545868;
      --border: #d6d8e8;
      --primary: #003fb1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    a.card {
      display: block;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: inherit;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(25, 27, 35, 0.06);
    }

    a.card:focus,
    a.card:hover {
      border-color: var(--primary);
      outline: none;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      object-position: top;
      background: #ededf8;
      border-bottom: 1px solid var(--border);
    }

    .meta {
      padding: 14px 14px 16px;
    }

    .role {
      margin-bottom: 8px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .title {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 700;
    }

    .route {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <header>
    <h1>RentFlow Stitch Export</h1>
    <p>Local browser index for the HTML prototypes exported from Google Stitch project 14435121892916306318.</p>
  </header>
  <main>
    <section class="grid" id="screens"></section>
  </main>
  <script>
    const screens = [
      ["Guest", "/", "Landing Page", "guest-landing-page"],
      ["Guest", "/listings", "Search Results", "guest-search-results"],
      ["Guest", "/listings/:id", "Listing Detail", "guest-listing-detail"],
      ["Guest", "/login error", "Login Error", "guest-login-error"],
      ["Guest", "/register", "Create Account", "guest-register"],
      ["Customer", "/listings/:id/book", "Book Your Ride", "customer-book-your-ride"],
      ["Customer", "booking review", "Review And Book", "customer-review-book"],
      ["Customer", "/me/profile", "Account Settings", "customer-account-settings"],
      ["Customer", "/bookings/:id", "Booking Details", "customer-booking-details"],
      ["Customer", "edit locations modal", "Edit Locations Modal", "customer-edit-locations-modal"],
      ["Customer", "cancel hold modal", "Cancel Hold", "customer-cancel-hold"],
      ["Host", "/host/dashboard", "Host Dashboard", "host-dashboard"],
      ["Host", "/host/vehicles", "Fleet Management", "host-fleet-management"],
      ["Host", "/host/vehicles/new", "Add Vehicle", "host-add-vehicle"],
      ["Host", "/host/listings/:id/availability", "Availability Manager", "host-availability"],
      ["Host", "/host/listings/:id", "Listing Detail", "host-listing-detail"],
      ["Admin", "/admin", "System Overview", "admin-system-overview"],
      ["Admin", "/admin/listings", "Listing Approval", "admin-listing-approval"],
      ["Admin", "/admin/listings/:id", "Approval Detail", "admin-approval-detail"],
      ["Admin", "driver profile review", "Driver Profile Review", "admin-driver-profile-review"],
      ["Admin", "reject listing modal", "Reject Approval", "admin-reject-approval"],
      ["Admin", "suspend listing modal", "Suspend Listing", "admin-suspend-listing"],
      ["Global", "404 / 410", "Page Not Found", "global-page-not-found"],
      ["Global", "system error", "System Error", "global-system-error"],
      ["Global", "loading / empty states", "States And Skeletons", "global-states-skeletons"],
      ["Global", "component library", "Component Kit", "global-component-kit"],
      ["Future", "payment", "Payment", "future-payment"],
      ["Future", "driver verification", "Driver Verification", "future-driver-verification"],
      ["Future", "audit logs", "Audit Logs", "future-audit-logs"],
      ["Future", "support center", "Support Center", "future-support-center"]
    ];

    document.getElementById("screens").innerHTML = screens.map(([role, route, title, key]) => `
      <a class="card" href="html/${key}.html">
        <img class="thumb" src="screenshots/${key}.png" alt="">
        <div class="meta">
          <div class="role">${role}</div>
          <h2 class="title">${title}</h2>
          <div class="route">${route}</div>
        </div>
      </a>
    `).join("");
  </script>
</body>
</html>
